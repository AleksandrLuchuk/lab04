name: CMake Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        
    steps:
    - uses: actions/checkout@v4

    - name: Install CMake
      run: |
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          sudo apt-get update && sudo apt-get install -y cmake
        fi

    - name: Build all components
      run: |
        cd formatter_lib && mkdir -p build && cd build
        cmake .. && cmake --build .
        
        cd ../../formatter_ex_lib && mkdir -p build && cd build
        cmake .. && cmake --build .
        
        cd ../../solver_lib && mkdir -p build && cd build
        cmake .. && cmake --build .
        
        cd ../../hello_world_application && mkdir -p build && cd build
        cmake .. && cmake --build .
        
        cd ../../solver_application && mkdir -p build && cd build
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cmake -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release
        else
          cmake .. && cmake --build .
        fi
