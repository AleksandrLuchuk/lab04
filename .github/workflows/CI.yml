name: CMake Build

on: [push, pull_request]

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++

    - name: Build formatter_lib
      run: |
        cd formatter_lib
        mkdir -p build && cd build
        cmake .. && cmake --build .

    - name: Build formatter_ex_lib
      run: |
        cd ../formatter_ex_lib
        mkdir -p build && cd build
        cmake .. && cmake --build .

    - name: Build solver_lib
      run: |
        cd ../../solver_lib
        mkdir -p build && cd build
        cmake .. && cmake --build .

    - name: Build hello_world_app
      run: |
        cd ../../hello_world_application
        mkdir -p build && cd build
        cmake .. && cmake --build .

    - name: Build solver_app
      run: |
        cd ../../solver_application
        mkdir -p build && cd build
        cmake .. && cmake --build .

  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build formatter_lib
      run: |
        cd formatter_lib
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release

    - name: Build formatter_ex_lib
      run: |
        cd ..\formatter_ex_lib
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release

    - name: Build solver_lib
      run: |
        cd ..\..\solver_lib
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release

    - name: Build hello_world_app
      run: |
        cd ..\..\hello_world_application
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release

    - name: Build solver_app
      run: |
        cd ..\..\solver_application
        mkdir build
        cd build
        cmake -G "Visual Studio 17 2022" -A x64 ..
        cmake --build . --config Release
